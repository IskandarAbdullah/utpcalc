<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTP Marks - Course Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--utp-blue:#003366;--utp-gold:#FFB81C;--bg:#f0f2f5}
        body{background:var(--bg);font-family:'Inter',sans-serif;padding-bottom:20px}
        .navbar{background:linear-gradient(135deg,var(--utp-blue),#004080);padding:12px 0;box-shadow:0 4px 20px rgba(0,51,102,0.2)}
        .navbar-brand{color:var(--utp-gold)!important;font-weight:700}
        .nav-link{color:rgba(255,255,255,0.7)!important;font-size:0.85rem}.nav-link:hover,.nav-link.active{color:var(--utp-gold)!important}
        .card{border:none;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.06);margin-bottom:16px}
        .review-card{animation:fadeUp 0.4s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .stars{color:var(--utp-gold);font-size:1rem}
        .difficulty-bar{height:6px;border-radius:4px;background:#e5e7eb}.difficulty-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#22c55e,#eab308,#ef4444)}
        .form-control,.form-select{border-radius:10px;border:2px solid #e5e7eb;font-size:0.85rem}
        .form-control:focus,.form-select:focus{border-color:var(--utp-gold);box-shadow:0 0 0 3px rgba(255,184,28,0.1)}
        .btn-utp{background:linear-gradient(135deg,var(--utp-blue),#004080);color:white;border:none;border-radius:10px;font-weight:600}
        .btn-utp:hover{color:white;transform:translateY(-1px)}
        .star-input{font-size:1.5rem;cursor:pointer;color:#d1d5db;transition:color 0.1s}
        .star-input.active,.star-input:hover{color:var(--utp-gold)}
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-3">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-graduation-cap me-1"></i>UTP Marks</a>
            <div class="d-flex gap-3">
                <a class="nav-link" href="/">Marks</a><a class="nav-link" href="/feed">Feed</a>
                <a class="nav-link active" href="/reviews">Reviews</a><a class="nav-link" href="/profile">Profile</a>
            </div>
        </div>
    </nav>
    <div class="container" style="max-width:700px;">
        <!-- Add Review -->
        <div class="card p-4 mb-3">
            <h6><i class="fas fa-star me-1 text-warning"></i>Write a Course Review</h6>
            <div class="row g-2 mb-2">
                <div class="col-md-4"><input type="text" id="rev-code" class="form-control form-control-sm" placeholder="Course Code (e.g. UCB2033)"></div>
                <div class="col-md-4"><input type="text" id="rev-name" class="form-control form-control-sm" placeholder="Course Name"></div>
                <div class="col-md-4"><input type="text" id="rev-lecturer" class="form-control form-control-sm" placeholder="Lecturer (optional)"></div>
            </div>
            <div class="mb-2">
                <label class="form-label small">Rating: <span id="rating-display">0</span>/5</label>
                <div id="star-container"></div>
            </div>
            <div class="mb-2">
                <label class="form-label small">Difficulty: <span id="diff-display">3</span>/5</label>
                <input type="range" id="rev-difficulty" class="form-range" min="1" max="5" value="3" oninput="document.getElementById('diff-display').textContent=this.value">
            </div>
            <div class="mb-2"><textarea id="rev-text" class="form-control form-control-sm" rows="3" placeholder="Your review... tips for future students?"></textarea></div>
            <button class="btn btn-utp btn-sm" onclick="submitReview()"><i class="fas fa-paper-plane me-1"></i>Submit Review</button>
        </div>
        <!-- Reviews List -->
        <div id="reviews-list"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedRating=0;
        function initStars(){
            const c=document.getElementById('star-container');
            for(let i=1;i<=5;i++){
                const s=document.createElement('span');s.className='star-input';s.textContent='★';
                s.onclick=()=>{selectedRating=i;document.getElementById('rating-display').textContent=i;document.querySelectorAll('.star-input').forEach((el,idx)=>el.classList.toggle('active',idx<i));};
                c.appendChild(s);
            }
        }
        async function loadReviews(){
            const r=await fetch('/api/reviews');const data=await r.json();
            document.getElementById('reviews-list').innerHTML=data.map(rv=>`
                <div class="card review-card p-3">
                    <div class="d-flex justify-content-between align-items-start">
                        <div><strong>${rv.course_code}</strong> - ${rv.course_name}<br><small class="text-muted">by ${rv.username} ${rv.lecturer?'· Lecturer: '+rv.lecturer:''}</small></div>
                        <div class="stars">${'★'.repeat(rv.rating)}${'☆'.repeat(5-rv.rating)}</div>
                    </div>
                    <div class="mt-2 d-flex align-items-center gap-2"><small class="text-muted">Difficulty:</small><div class="difficulty-bar flex-grow-1"><div class="difficulty-fill" style="width:${rv.difficulty*20}%"></div></div><small>${rv.difficulty}/5</small></div>
                    ${rv.review_text?`<p class="mt-2 mb-0 small">${rv.review_text}</p>`:''}
                </div>
            `).join('')||'<p class="text-muted text-center">No reviews yet. Be the first!</p>';
        }
        async function submitReview(){
            const code=document.getElementById('rev-code').value.trim();
            if(!code||!selectedRating)return alert('Enter course code and rating');
            await fetch('/api/reviews',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({course_code:code,course_name:document.getElementById('rev-name').value.trim(),rating:selectedRating,difficulty:document.getElementById('rev-difficulty').value,review_text:document.getElementById('rev-text').value.trim(),lecturer:document.getElementById('rev-lecturer').value.trim()})});
            document.getElementById('rev-code').value='';document.getElementById('rev-name').value='';document.getElementById('rev-text').value='';selectedRating=0;
            document.querySelectorAll('.star-input').forEach(el=>el.classList.remove('active'));document.getElementById('rating-display').textContent='0';
            loadReviews();
        }
        initStars();loadReviews();
    </script>
</body>
</html>
