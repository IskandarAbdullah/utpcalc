<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTP Mark Calculator - Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --utp-blue: #003366; --utp-gold: #FFB81C; --utp-light: #f8f9fa; }
        body { background-color: var(--utp-light); font-family: 'Segoe UI', sans-serif; }
        .navbar { background: linear-gradient(135deg, var(--utp-blue), #004080); }
        .navbar-brand { color: var(--utp-gold) !important; font-weight: 700; }
        .btn-utp { background: var(--utp-blue); color: white; border: none; }
        .btn-utp:hover { background: #004080; color: white; }
        .btn-gold { background: var(--utp-gold); color: var(--utp-blue); border: none; font-weight: 600; }
        .btn-gold:hover { background: #e6a519; color: var(--utp-blue); }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .calendar-header { background: var(--utp-blue); color: white; padding: 8px; text-align: center; font-weight: 600; font-size: 0.85rem; }
        .calendar-day {
            min-height: 90px; padding: 4px; border: 1px solid #e9ecef; background: white;
            cursor: pointer; position: relative; transition: background 0.2s;
        }
        .calendar-day:hover { background: #f0f4ff; }
        .calendar-day.today { background: #fff8e1; border-color: var(--utp-gold); }
        .calendar-day.other-month { background: #f5f5f5; color: #aaa; }
        .day-number { font-weight: 600; font-size: 0.85rem; color: var(--utp-blue); }
        .other-month .day-number { color: #ccc; }
        .event-dot {
            display: inline-block; padding: 1px 5px; border-radius: 4px;
            font-size: 0.65rem; margin-top: 2px; color: white; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; max-width: 100%;
        }
        .event-test { background: #dc3545; }
        .event-quiz { background: #fd7e14; }
        .event-assignment { background: #0d6efd; }
        .event-lab { background: #198754; }
        .event-exam { background: #6f42c1; }
        .event-other { background: #6c757d; }
        .month-nav { font-size: 1.3rem; font-weight: 700; color: var(--utp-blue); }
        .event-list-item { border-left: 4px solid; padding: 8px 12px; margin-bottom: 8px; background: white; border-radius: 0 8px 8px 0; }
        .nav-link { color: rgba(255,255,255,0.8) !important; }
        .nav-link:hover, .nav-link.active { color: var(--utp-gold) !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-graduation-cap me-2"></i>UTP Mark Calculator
            </a>
            <div class="navbar-nav ms-auto d-flex flex-row gap-3">
                <a class="nav-link" href="/"><i class="fas fa-calculator me-1"></i> Marks</a>
                <a class="nav-link active" href="/calendar"><i class="fas fa-calendar me-1"></i> Calendar</a>
                <a class="nav-link" href="/outlines"><i class="fas fa-file-pdf me-1"></i> Outlines</a>
                <a class="nav-link" href="#" onclick="doLogout()"><i class="fas fa-sign-out-alt me-1"></i> Logout</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <!-- Calendar -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(-1)">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <span class="month-nav" id="month-label">July 2025</span>
                            <button class="btn btn-sm btn-outline-secondary" onclick="changeMonth(1)">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                        <div class="calendar-grid">
                            <div class="calendar-header">Sun</div>
                            <div class="calendar-header">Mon</div>
                            <div class="calendar-header">Tue</div>
                            <div class="calendar-header">Wed</div>
                            <div class="calendar-header">Thu</div>
                            <div class="calendar-header">Fri</div>
                            <div class="calendar-header">Sat</div>
                        </div>
                        <div class="calendar-grid" id="calendar-days"></div>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-header bg-dark text-white">
                        <i class="fas fa-plus me-1"></i> Add Event
                    </div>
                    <div class="card-body">
                        <div class="mb-2">
                            <input type="text" id="event-title" class="form-control form-control-sm" placeholder="Event title (e.g. Test 1)">
                        </div>
                        <div class="mb-2">
                            <select id="event-type" class="form-select form-select-sm">
                                <option value="test">Test</option>
                                <option value="quiz">Quiz</option>
                                <option value="assignment">Assignment Due</option>
                                <option value="lab">Lab</option>
                                <option value="exam">Final Exam</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <select id="event-course" class="form-select form-select-sm">
                                <option value="">-- Course (optional) --</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <input type="date" id="event-date" class="form-control form-control-sm">
                        </div>
                        <div class="mb-2">
                            <input type="time" id="event-time" class="form-control form-control-sm">
                        </div>
                        <div class="mb-2">
                            <textarea id="event-desc" class="form-control form-control-sm" rows="2" placeholder="Description (optional)"></textarea>
                        </div>
                        <button class="btn btn-utp btn-sm w-100" onclick="addEvent()">
                            <i class="fas fa-plus me-1"></i> Add Event
                        </button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header bg-dark text-white">
                        <i class="fas fa-list me-1"></i> Upcoming Events
                    </div>
                    <div class="card-body" id="upcoming-events">
                        <p class="text-muted text-center">No events yet</p>
                    </div>
                </div>

                <!-- AI Calendar Edit -->
                <div class="card mt-3">
                    <div class="card-header bg-dark text-white">
                        <i class="fas fa-robot me-1"></i> AI Calendar Assistant
                    </div>
                    <div class="card-body">
                        <small class="text-muted d-block mb-2">Tell AI what to add/change in your calendar:</small>
                        <textarea id="ai-cal-input" class="form-control form-control-sm mb-2" rows="3" 
                            placeholder="e.g. 'Add Test 1 for UCB2033 on 20th August at 2pm' or 'Delete the quiz on 15th July'"></textarea>
                        <button class="btn btn-gold btn-sm w-100 mb-2" onclick="aiCalendarEdit()">
                            <i class="fas fa-magic me-1"></i> AI Add/Edit Events
                        </button>
                        <div id="ai-cal-result" style="display:none;"></div>
                        <hr>
                        <small class="text-muted d-block mb-2">Or upload a PDF schedule/timetable:</small>
                        <div class="mb-2">
                            <select id="cal-pdf-course" class="form-select form-select-sm">
                                <option value="">-- Select Course (so AI knows which course) --</option>
                            </select>
                        </div>
                        <input type="file" id="cal-pdf-file" class="form-control form-control-sm mb-2" accept=".pdf">
                        <button class="btn btn-utp btn-sm w-100" onclick="aiCalendarPDF()">
                            <i class="fas fa-file-pdf me-1"></i> Extract Events from PDF
                        </button>
                        <div id="ai-pdf-cal-result" class="mt-2" style="display:none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Event Detail Modal -->
    <div class="modal fade" id="eventDetailModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title" id="event-detail-title"></h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="event-detail-body"></div>
                <div class="modal-footer">
                    <button class="btn btn-sm btn-outline-danger" id="event-delete-btn">
                        <i class="fas fa-trash me-1"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth(); // 0-indexed
        let allEvents = [];

        const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

        async function doLogout() {
            await fetch('/api/auth/logout', {method: 'POST'});
            window.location.href = '/login';
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        async function loadEvents() {
            const res = await fetch(`/api/calendar/events?month=${currentMonth + 1}&year=${currentYear}`);
            allEvents = await res.json();
            renderCalendar();
            renderUpcoming();
        }

        function renderCalendar() {
            document.getElementById('month-label').textContent = `${monthNames[currentMonth]} ${currentYear}`;
            const container = document.getElementById('calendar-days');
            container.innerHTML = '';

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
            const today = new Date();

            // Previous month days
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                container.innerHTML += `<div class="calendar-day other-month"><span class="day-number">${day}</span></div>`;
            }

            // Current month days
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const isToday = today.getFullYear() === currentYear && today.getMonth() === currentMonth && today.getDate() === d;
                const dayEvents = allEvents.filter(e => e.date === dateStr);

                let eventsHtml = dayEvents.map(e =>
                    `<div class="event-dot event-${e.event_type}" onclick="showEventDetail(${e.id})" title="${e.title}">${e.course_code ? e.course_code+': ' : ''}${e.title}</div>`
                ).join('');

                container.innerHTML += `
                    <div class="calendar-day ${isToday ? 'today' : ''}" onclick="selectDate('${dateStr}')">
                        <span class="day-number">${d}</span>
                        ${eventsHtml}
                    </div>`;
            }

            // Next month days
            const totalCells = firstDay + daysInMonth;
            const remaining = (7 - (totalCells % 7)) % 7;
            for (let i = 1; i <= remaining; i++) {
                container.innerHTML += `<div class="calendar-day other-month"><span class="day-number">${i}</span></div>`;
            }
        }

        function renderUpcoming() {
            const container = document.getElementById('upcoming-events');
            const today = new Date().toISOString().split('T')[0];
            const upcoming = allEvents.filter(e => e.date >= today).sort((a,b) => a.date.localeCompare(b.date));

            if (upcoming.length === 0) {
                container.innerHTML = '<p class="text-muted text-center small">No upcoming events this month</p>';
                return;
            }

            container.innerHTML = upcoming.map(e => `
                <div class="event-list-item" style="border-left-color: var(--event-color-${e.event_type})">
                    <div class="d-flex justify-content-between">
                        <strong class="small">${e.title}</strong>
                        <button class="btn btn-sm p-0 text-danger" onclick="deleteEvent(${e.id})"><i class="fas fa-times"></i></button>
                    </div>
                    <small class="text-muted">${e.date} ${e.time || ''} ${e.course_code ? '| ' + e.course_code : ''}</small>
                </div>
            `).join('');
        }

        function selectDate(dateStr) {
            document.getElementById('event-date').value = dateStr;
        }

        function showEventDetail(eventId) {
            const event = allEvents.find(e => e.id === eventId);
            if (!event) return;

            document.getElementById('event-detail-title').textContent = event.title;
            document.getElementById('event-detail-body').innerHTML = `
                <p><strong>Type:</strong> ${event.event_type}</p>
                ${event.course_code ? `<p><strong>Course:</strong> ${event.course_code}</p>` : ''}
                <p><strong>Date:</strong> ${event.date} ${event.time || ''}</p>
                ${event.description ? `<p><strong>Notes:</strong> ${event.description}</p>` : ''}
            `;
            document.getElementById('event-delete-btn').onclick = () => deleteEvent(eventId);
            new bootstrap.Modal(document.getElementById('eventDetailModal')).show();
        }

        async function addEvent() {
            const title = document.getElementById('event-title').value.trim();
            const event_type = document.getElementById('event-type').value;
            const course_code = document.getElementById('event-course').value;
            const date = document.getElementById('event-date').value;
            const time = document.getElementById('event-time').value;
            const description = document.getElementById('event-desc').value.trim();

            if (!title || !date) return alert('Title and date are required');

            await fetch('/api/calendar/events', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, event_type, course_code, date, time, description})
            });

            document.getElementById('event-title').value = '';
            document.getElementById('event-desc').value = '';
            document.getElementById('event-time').value = '';
            loadEvents();
        }

        async function deleteEvent(id) {
            if (!confirm('Delete this event?')) return;
            await fetch(`/api/calendar/events/${id}`, {method: 'DELETE'});
            // Close modal if open
            const modal = bootstrap.Modal.getInstance(document.getElementById('eventDetailModal'));
            if (modal) modal.hide();
            loadEvents();
        }

        async function loadCourses() {
            const res = await fetch('/api/semesters');
            const semesters = await res.json();
            const courseSelect = document.getElementById('event-course');
            const pdfCourseSelect = document.getElementById('cal-pdf-course');

            for (const sem of semesters) {
                for (const course of sem.courses) {
                    const opt = document.createElement('option');
                    opt.value = course.code;
                    opt.textContent = `${course.code} - ${course.name}`;
                    courseSelect.appendChild(opt);

                    const opt2 = document.createElement('option');
                    opt2.value = course.code;
                    opt2.textContent = `${course.code} - ${course.name}`;
                    pdfCourseSelect.appendChild(opt2);
                }
            }
        }

        // ============ AI CALENDAR FUNCTIONS ============
        let aiCalendarEvents = null;
        let aiPdfCalendarEvents = null;

        async function aiCalendarEdit() {
            const instruction = document.getElementById('ai-cal-input').value.trim();
            const resultDiv = document.getElementById('ai-cal-result');

            if (!instruction) return alert('Enter an instruction for the AI');

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<small class="text-info"><i class="fas fa-spinner fa-spin"></i> AI is processing...</small>';

            try {
                const res = await fetch('/api/ai/calendar-edit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({instruction})
                });
                const data = await res.json();

                if (data.success && data.events.length > 0) {
                    aiCalendarEvents = data.events;
                    let html = '<small class="text-success"><i class="fas fa-check me-1"></i>AI suggests:</small><ul class="small mb-2">';
                    data.events.forEach(e => {
                        const icon = e.action === 'delete' ? '🗑️' : '➕';
                        html += `<li>${icon} ${e.title} (${e.event_type}) - ${e.date} ${e.time || ''} ${e.course_code ? '['+e.course_code+']' : ''}</li>`;
                    });
                    html += '</ul>';
                    html += `<button class="btn btn-sm btn-success w-100" onclick="applyAiCalendar()"><i class="fas fa-check me-1"></i> Apply Changes</button>`;
                    resultDiv.innerHTML = html;
                } else if (data.success && data.events.length === 0) {
                    resultDiv.innerHTML = '<small class="text-warning">AI could not identify any events. Try being more specific with dates.</small>';
                } else {
                    resultDiv.innerHTML = `<small class="text-danger"><i class="fas fa-times me-1"></i>${data.error}</small>`;
                }
            } catch (e) {
                resultDiv.innerHTML = '<small class="text-danger">Error connecting to AI service.</small>';
            }
        }

        async function applyAiCalendar() {
            if (!aiCalendarEvents) return;
            const resultDiv = document.getElementById('ai-cal-result');

            const res = await fetch('/api/ai/calendar-apply', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({events: aiCalendarEvents})
            });
            const data = await res.json();

            resultDiv.innerHTML = `<small class="text-success"><i class="fas fa-check me-1"></i>${data.message}</small>`;
            aiCalendarEvents = null;
            document.getElementById('ai-cal-input').value = '';
            loadEvents();
        }

        async function aiCalendarPDF() {
            const fileInput = document.getElementById('cal-pdf-file');
            const courseCode = document.getElementById('cal-pdf-course').value;
            const resultDiv = document.getElementById('ai-pdf-cal-result');

            if (!fileInput.files[0]) return alert('Select a PDF file');

            const formData = new FormData();
            formData.append('pdf', fileInput.files[0]);
            if (courseCode) {
                formData.append('course_code', courseCode);
            }

            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<small class="text-info"><i class="fas fa-spinner fa-spin"></i> AI is reading your PDF...</small>';

            try {
                const res = await fetch('/api/ai/calendar-pdf', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.success && data.events.length > 0) {
                    aiPdfCalendarEvents = data.events.map(e => ({...e, action: 'add'}));
                    let html = `<small class="text-success"><i class="fas fa-check me-1"></i>Found ${data.events.length} events:</small><ul class="small mb-2">`;
                    data.events.forEach(e => {
                        html += `<li>${e.date} ${e.time || ''} - ${e.title} (${e.event_type}) ${e.course_code ? '['+e.course_code+']' : ''}</li>`;
                    });
                    html += '</ul>';
                    html += `<button class="btn btn-sm btn-success w-100" onclick="applyPdfCalendar()"><i class="fas fa-check me-1"></i> Add All Events</button>`;
                    resultDiv.innerHTML = html;
                } else if (data.success) {
                    resultDiv.innerHTML = '<small class="text-warning">No events found in the PDF.</small>';
                } else {
                    resultDiv.innerHTML = `<small class="text-danger"><i class="fas fa-times me-1"></i>${data.error}</small>`;
                }
            } catch (e) {
                resultDiv.innerHTML = '<small class="text-danger">Error processing PDF.</small>';
            }
        }

        async function applyPdfCalendar() {
            if (!aiPdfCalendarEvents) return;
            const resultDiv = document.getElementById('ai-pdf-cal-result');

            const res = await fetch('/api/ai/calendar-apply', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({events: aiPdfCalendarEvents})
            });
            const data = await res.json();

            resultDiv.innerHTML = `<small class="text-success"><i class="fas fa-check me-1"></i>${data.message}</small>`;
            aiPdfCalendarEvents = null;
            document.getElementById('cal-pdf-file').value = '';
            loadEvents();
        }

        // Init
        loadCourses();
        loadEvents();
    </script>
</body>
</html>
