<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTP Marks - Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--utp-blue:#003366;--utp-gold:#FFB81C;--bg:#f0f2f5}
        body{background:var(--bg);font-family:'Inter',sans-serif;padding-bottom:80px}
        .navbar{background:linear-gradient(135deg,var(--utp-blue),#004080);padding:12px 0;box-shadow:0 4px 20px rgba(0,51,102,0.2)}
        .navbar-brand{color:var(--utp-gold)!important;font-weight:700}
        .nav-link{color:rgba(255,255,255,0.7)!important;font-size:0.85rem}.nav-link:hover,.nav-link.active{color:var(--utp-gold)!important}
        .card{border:none;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.06)}
        .form-control,.form-select{border-radius:10px;border:2px solid #e5e7eb;font-size:0.85rem}
        .form-control:focus,.form-select:focus{border-color:var(--utp-gold);box-shadow:0 0 0 3px rgba(255,184,28,0.1)}
        .btn-utp{background:linear-gradient(135deg,var(--utp-blue),#004080);color:white;border:none;border-radius:10px;font-weight:600}
        .btn-utp:hover{color:white;transform:translateY(-1px)}
        .attendance-card{padding:16px;border-radius:12px;margin-bottom:12px;background:white;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
        .att-present{border-left:4px solid #22c55e}
        .att-absent{border-left:4px solid #ef4444}
        .att-late{border-left:4px solid #f59e0b}
        .progress{height:12px;border-radius:8px;background:#e5e7eb}
        .progress-bar{border-radius:8px}
        .summary-card{text-align:center;padding:20px;border-radius:12px;background:white;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
        .summary-pct{font-size:2rem;font-weight:800}
        .good{color:#22c55e}.warning{color:#f59e0b}.danger{color:#ef4444}
        .bottom-nav{display:none}
        @media(max-width:768px){
            .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--utp-blue);z-index:9999;justify-content:space-around;padding:8px 0;box-shadow:0 -4px 20px rgba(0,0,0,0.15)}
            .bottom-nav a{color:rgba(255,255,255,0.6);text-decoration:none;text-align:center;font-size:0.6rem;padding:4px 6px}
            .bottom-nav a.active,.bottom-nav a:hover{color:var(--utp-gold)}
            .bottom-nav i{display:block;font-size:1.1rem;margin-bottom:2px}
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-3">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-graduation-cap me-1"></i>UTP Marks</a>
            <div class="d-flex gap-3">
                <a class="nav-link" href="/">Marks</a><a class="nav-link" href="/calendar">Calendar</a>
                <a class="nav-link active" href="/attendance">Attendance</a><a class="nav-link" href="/profile">Profile</a>
            </div>
        </div>
    </nav>
    <div class="bottom-nav">
        <a href="/"><i class="fas fa-calculator"></i>Marks</a>
        <a href="/calendar"><i class="fas fa-calendar"></i>Calendar</a>
        <a href="/timetable"><i class="fas fa-clock"></i>Timetable</a>
        <a href="/attendance" class="active"><i class="fas fa-clipboard-check"></i>Attend</a>
        <a href="/profile"><i class="fas fa-user"></i>Profile</a>
    </div>
    <div class="container" style="max-width:700px;">
        <!-- Quick Add -->
        <div class="card p-3 mb-3">
            <h6><i class="fas fa-plus-circle me-1"></i>Mark Attendance</h6>
            <div class="row g-2">
                <div class="col"><select id="att-course" class="form-select form-select-sm"><option value="">Select Course</option></select></div>
                <div class="col"><input type="date" id="att-date" class="form-control form-control-sm"></div>
                <div class="col">
                    <select id="att-status" class="form-select form-select-sm">
                        <option value="present">✅ Present</option>
                        <option value="absent">❌ Absent</option>
                        <option value="late">⚠️ Late</option>
                    </select>
                </div>
                <div class="col-auto"><button class="btn btn-utp btn-sm" onclick="addAttendance()"><i class="fas fa-check"></i></button></div>
            </div>
        </div>
        <!-- Summary -->
        <h6 class="mb-2"><i class="fas fa-chart-pie me-1"></i>Summary</h6>
        <div class="row mb-3" id="summary-cards"></div>
        <!-- History -->
        <h6 class="mb-2"><i class="fas fa-history me-1"></i>Recent Records</h6>
        <div id="attendance-history"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('att-date').value = new Date().toISOString().split('T')[0];
        async function loadCourses(){
            const r=await fetch('/api/semesters');const sems=await r.json();
            const sel=document.getElementById('att-course');
            sems.forEach(s=>s.courses.forEach(c=>{const o=document.createElement('option');o.value=c.code;o.textContent=`${c.code} - ${c.name}`;sel.appendChild(o);}));
        }
        async function addAttendance(){
            const code=document.getElementById('att-course').value;
            const date=document.getElementById('att-date').value;
            const status=document.getElementById('att-status').value;
            if(!code||!date)return alert('Select course and date');
            await fetch('/api/attendance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({course_code:code,date,status})});
            loadSummary();loadHistory();
        }
        async function loadSummary(){
            const r=await fetch('/api/attendance/summary');const d=await r.json();
            const el=document.getElementById('summary-cards');
            const keys=Object.keys(d);
            if(!keys.length){el.innerHTML='<div class="col-12"><p class="text-muted text-center">No records yet. Start marking attendance above.</p></div>';return;}
            el.innerHTML=keys.map(k=>{
                const pct=d[k].percentage;
                const cls=pct>=80?'good':pct>=60?'warning':'danger';
                const barCls=pct>=80?'bg-success':pct>=60?'bg-warning':'bg-danger';
                return `<div class="col-md-4 col-6 mb-2"><div class="summary-card"><div class="summary-pct ${cls}">${pct}%</div><strong class="small">${k}</strong><div class="progress mt-2"><div class="progress-bar ${barCls}" style="width:${pct}%"></div></div><small class="text-muted">${d[k].present}P ${d[k].late}L ${d[k].absent}A / ${d[k].total}</small></div></div>`;
            }).join('');
        }
        async function loadHistory(){
            const r=await fetch('/api/attendance');const data=await r.json();
            const el=document.getElementById('attendance-history');
            if(!data.length){el.innerHTML='<p class="text-muted text-center small">No records</p>';return;}
            el.innerHTML=data.slice(0,30).map(a=>`
                <div class="attendance-card att-${a.status}">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <strong class="small">${a.course_code}</strong>
                            <small class="text-muted ms-2">${a.date}</small>
                        </div>
                        <div class="d-flex align-items-center gap-1">
                            <select class="form-select form-select-sm" style="width:auto;font-size:0.7rem;padding:2px 6px;" onchange="editAttendance(${a.id}, this.value)">
                                <option value="present" ${a.status==='present'?'selected':''}>✅ Present</option>
                                <option value="late" ${a.status==='late'?'selected':''}>⚠️ Late</option>
                                <option value="absent" ${a.status==='absent'?'selected':''}>❌ Absent</option>
                            </select>
                            <button class="btn btn-sm p-0 px-1 text-danger" onclick="deleteAttendance(${a.id})" title="Delete"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function editAttendance(id, status) {
            await fetch(`/api/attendance/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status})
            });
            loadSummary();
        }

        async function deleteAttendance(id) {
            if (!confirm('Delete this record?')) return;
            await fetch(`/api/attendance/${id}`, {method: 'DELETE'});
            loadSummary(); loadHistory();
        }

        loadCourses();loadSummary();loadHistory();
    </script>
</body>
</html>
