<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#003366">
    <link rel="manifest" href="/static/manifest.json">
    <title>UTP Mark Calculator - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --utp-blue: #003366; --utp-gold: #FFB81C; }
        body {
            background: linear-gradient(135deg, #003366 0%, #004080 50%, #001a33 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
        }
        .login-header {
            background: var(--utp-blue);
            padding: 30px;
            text-align: center;
            color: white;
        }
        .login-header h2 { color: var(--utp-gold); margin: 0; }
        .login-header p { margin: 8px 0 0; opacity: 0.8; }
        .login-body { padding: 30px; }
        .btn-utp { background: var(--utp-blue); color: white; border: none; }
        .btn-utp:hover { background: #004080; color: white; }
        .btn-gold { background: var(--utp-gold); color: var(--utp-blue); border: none; font-weight: 600; }
        .btn-gold:hover { background: #e6a519; color: var(--utp-blue); }
        .form-control:focus { border-color: var(--utp-gold); box-shadow: 0 0 0 0.2rem rgba(255,184,28,0.25); }
        .tab-btn { cursor: pointer; padding: 10px 20px; border: none; background: none; color: white; opacity: 0.7; }
        .tab-btn.active { opacity: 1; border-bottom: 3px solid var(--utp-gold); font-weight: 600; }
        .alert { font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h2><i class="fas fa-graduation-cap me-2"></i>UTP Mark Calculator</h2>
            <p>Powered by AI (Llama3)</p>
            <div class="mt-3">
                <button class="tab-btn active" onclick="showTab('login')">Login</button>
                <button class="tab-btn" onclick="showTab('register')">Register</button>
            </div>
        </div>
        <div class="login-body">
            <div id="alert-box"></div>

            <!-- LOGIN FORM -->
            <div id="login-form">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" id="login-username" class="form-control" placeholder="Enter username">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" id="login-password" class="form-control" placeholder="Enter password"
                               onkeypress="if(event.key==='Enter')doLogin()">
                    </div>
                </div>
                <button class="btn btn-utp w-100 py-2" onclick="doLogin()">
                    <i class="fas fa-sign-in-alt me-2"></i>Login
                </button>
            </div>

            <!-- REGISTER FORM -->
            <div id="register-form" style="display:none;">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                        <input type="text" id="reg-fullname" class="form-control" placeholder="e.g. Ahmad Iskandar">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" id="reg-username" class="form-control" placeholder="Choose a username">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" id="reg-password" class="form-control" placeholder="Choose a password">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Programme</label>
                    <select id="reg-program" class="form-select">
                        <option value="">-- Select Your Programme --</option>
                        <option value="cs">Bachelor of Computer Science (Hons)</option>
                        <option value="ce">Bachelor of Computer Engineering (Hons)</option>
                        <option value="ee">Bachelor of Electrical & Electronics Engineering (Hons)</option>
                        <option value="me">Bachelor of Mechanical Engineering (Hons)</option>
                        <option value="chem">Bachelor of Chemical Engineering (Hons)</option>
                        <option value="civil">Bachelor of Civil Engineering (Hons)</option>
                        <option value="petro">Bachelor of Petroleum Engineering (Hons)</option>
                        <option value="ibm">Bachelor in Business Management (Hons)</option>
                        <option value="is">Bachelor of Information Systems (Hons)</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Current Semester</label>
                    <select id="reg-semester" class="form-select">
                        <option value="1">Semester 1</option>
                        <option value="2">Semester 2</option>
                        <option value="3">Semester 3</option>
                        <option value="4">Semester 4</option>
                        <option value="5">Semester 5</option>
                        <option value="6">Semester 6</option>
                        <option value="7">Semester 7</option>
                        <option value="8">Semester 8</option>
                    </select>
                </div>
                <button class="btn btn-gold w-100 py-2" onclick="doRegister()">
                    <i class="fas fa-user-plus me-2"></i>Register & Start
                </button>
                <small class="d-block text-muted text-center mt-2">
                    Your courses will be auto-loaded based on programme & semester
                </small>
            </div>
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
            document.getElementById('alert-box').innerHTML = '';
        }

        function showAlert(msg, type) {
            document.getElementById('alert-box').innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show">
                    ${msg}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>`;
        }

        async function doLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            if (!username || !password) return showAlert('Please fill in all fields', 'warning');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    showAlert(data.error, 'danger');
                }
            } catch (e) {
                showAlert('Connection error', 'danger');
            }
        }

        async function doRegister() {
            const full_name = document.getElementById('reg-fullname').value.trim();
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const program_id = document.getElementById('reg-program').value;
            const current_semester = document.getElementById('reg-semester').value;

            if (!full_name || !username || !password || !program_id) {
                return showAlert('Please fill in all fields', 'warning');
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({full_name, username, password, program_id, current_semester})
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = '/';
                } else {
                    showAlert(data.error, 'danger');
                }
            } catch (e) {
                showAlert('Connection error', 'danger');
            }
        }
    </script>

    <!-- PWA Install Button -->
    <div id="install-banner" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9999;">
        <button id="install-btn" class="btn btn-gold btn-lg shadow-lg" style="border-radius:50px; padding:12px 30px;">
            <i class="fas fa-download me-2"></i> Install App
        </button>
    </div>

    <script>
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                if (result.outcome === 'accepted') {
                    installBanner.style.display = 'none';
                }
                deferredPrompt = null;
            } else {
                // Fallback: show instructions
                alert('To install:\\n\\nAndroid Chrome: Tap ⋮ menu → "Add to Home Screen"\\n\\niPhone Safari: Tap Share → "Add to Home Screen"');
            }
        });

        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
        });

        // Hide if already installed as PWA
        if (window.matchMedia('(display-mode: standalone)').matches) {
            installBanner.style.display = 'none';
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js');
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
