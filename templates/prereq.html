<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTP Marks - Course Prerequisites</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    {% include "darkmode.html" %}
    <style>
        :root{--utp-blue:#003366;--utp-gold:#FFB81C;--bg:#f0f2f5}
        body{background:var(--bg);font-family:'Inter',sans-serif;padding-bottom:20px;margin:0}
        .navbar{background:linear-gradient(135deg,var(--utp-blue),#004080);padding:12px 0;box-shadow:0 4px 20px rgba(0,51,102,0.2)}
        .navbar-brand{color:var(--utp-gold)!important;font-weight:700}
        .nav-link{color:rgba(255,255,255,0.7)!important;font-size:0.85rem}.nav-link:hover,.nav-link.active{color:var(--utp-gold)!important}
        #prereq-graph{width:100%;height:70vh;border-radius:16px;background:white;box-shadow:0 4px 20px rgba(0,0,0,0.06);border:none}
        .legend{display:flex;gap:16px;flex-wrap:wrap;padding:12px;font-size:0.8rem}
        .legend-item{display:flex;align-items:center;gap:6px}
        .legend-dot{width:14px;height:14px;border-radius:4px}
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-3">
        <div class="container"><a class="navbar-brand" href="/"><i class="fas fa-graduation-cap me-1"></i>UTP Marks</a>
            <div class="d-flex gap-3"><a class="nav-link" href="/">Marks</a><a class="nav-link active" href="/prereq">Prerequisites</a><a class="nav-link" href="/profile">Profile</a></div>
        </div>
    </nav>
    <div class="container-fluid px-3">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="mb-0"><i class="fas fa-project-diagram me-1"></i>Course Prerequisite Map</h6>
            <small class="text-muted" id="prog-name"></small>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="legend-dot" style="background:#003366"></div>Sem 1-2</div>
            <div class="legend-item"><div class="legend-dot" style="background:#0284c7"></div>Sem 3-4</div>
            <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div>Sem 5-6</div>
            <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>Sem 7-8</div>
            <div class="legend-item"><i class="fas fa-arrow-right text-muted"></i><small>Arrow = prerequisite</small></div>
        </div>
        <div id="prereq-graph"></div>
    </div>
    <script>
        async function loadGraph() {
            const res = await fetch('/api/prerequisites');
            const data = await res.json();
            document.getElementById('prog-name').textContent = data.programme;

            // Color nodes by semester level (based on course code number)
            const nodes = data.nodes.map(n => {
                const num = parseInt(n.id.match(/\d/)?.[0] || '1');
                let color = '#003366';
                if (num >= 3 && num <= 4) color = '#0284c7';
                else if (num >= 5 && num <= 6) color = '#16a34a';
                else if (num >= 7) color = '#dc2626';
                else color = '#003366';
                return {
                    id: n.id,
                    label: n.label,
                    color: {background: color, border: color, highlight: {background: '#FFB81C', border: '#FFB81C'}},
                    font: {color: 'white', size: 11, face: 'Inter'},
                    shape: 'box',
                    borderWidth: 0,
                    margin: 8
                };
            });

            const edges = data.edges.map(e => ({
                from: e.from, to: e.to,
                arrows: 'to',
                color: {color: '#9ca3af', highlight: '#FFB81C'},
                smooth: {type: 'cubicBezier', forceDirection: 'vertical'}
            }));

            const container = document.getElementById('prereq-graph');
            const network = new vis.Network(container, {nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges)}, {
                layout: {
                    hierarchical: {direction: 'UD', sortMethod: 'directed', levelSeparation: 120, nodeSpacing: 160}
                },
                physics: false,
                interaction: {zoomView: true, dragView: true, hover: true},
                edges: {width: 2}
            });
        }
        loadGraph();
    </script>
</body>
</html>
